{% extends 'myapp/base.html' %}

{% block body %}
<div class="flex flex-col justify-center items-center min-h-screen p-10">

    <h1>Login</h1>
    <form action="" method="POST" class="shadow-lg p-10 space-y-5 bg-gray-100">
        {% csrf_token %}
        {% if form.non_field_errors %}
        <div class="bg-red-500 text-white p-2 rounded-md">
            {% for error in form.non_field_errors %}
            <p>{{error}}</p>
            {% endfor %}
        </div>
        {% endif %}
        <div>
            <label for="">Username</label>
            <div class="border rounded p-2">{{form.username}}</div>
        </div>
        <div>
            <label for="">Password</label>
            <div class="border rounded p-2">{{form.password}}</div>
        </div>
        <button type="submit" class="bg-blue-500 px-2 py-2 w-full mt-2 text-white rounded-md">Login</button>
    </form>
</div>
{% endblock %}
